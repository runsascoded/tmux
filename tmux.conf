# =============================================================================
# tmux config — ~/.config/tmux/tmux.conf
# =============================================================================

# ---------------------------------------------------------------------------
# Prefix: ctrl-space (avoids ctrl-a / ctrl-b conflicts)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g display-time 3000
set -g focus-events on
set -g mouse on
set -g escape-time 0           # No delay after pressing Escape
set -g base-index 1            # Windows start at 1
set -g pane-base-index 1       # Panes start at 1
set -g renumber-windows on     # Renumber when a window is closed
set -g set-clipboard on

# ---------------------------------------------------------------------------
# Key bindings: Pane splitting (use current pane's path)
# ---------------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ---------------------------------------------------------------------------
# Key bindings: Pane navigation (vim-style)
# ---------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+Up/Down without prefix for tmux pane navigation
# (Alt+Left/Right reserved for word-jump in shell)
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ---------------------------------------------------------------------------
# Key bindings: Pane resizing
# ---------------------------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------------------------------
# Key bindings: Window navigation
# ---------------------------------------------------------------------------
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ---------------------------------------------------------------------------
# Key bindings: Misc
# ---------------------------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind S setw synchronize-panes \; display "Sync #{?pane_synchronized,ON,OFF}"
bind = select-layout -E                # Equalize panes (spread evenly, preserve layout)
bind z resize-pane -Z                  # Toggle zoom (already default)

# ---------------------------------------------------------------------------
# Layout mode: prefix + w, then pick a layout
# ---------------------------------------------------------------------------
bind w switch-client -T layout
bind -T layout 1 select-layout even-horizontal    # side-by-side
bind -T layout 2 select-layout even-vertical      # stacked
bind -T layout 3 select-layout main-horizontal    # big top, rest below
bind -T layout 4 select-layout main-vertical      # big left, rest right
bind -T layout 5 select-layout tiled              # tiled
bind -T layout = select-layout -E                 # equalize, preserve layout

# ---------------------------------------------------------------------------
# Copy mode: vi keys
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#89b4fa,bold] #S #[default]│ "
set -g status-right "#[fg=#6c7086]#H │ %H:%M"

# Window status
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
