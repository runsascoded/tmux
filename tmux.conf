# =============================================================================
# tmux config — ~/.config/tmux/tmux.conf
# =============================================================================

# ---------------------------------------------------------------------------
# Prefix: ctrl-space (avoids ctrl-a / ctrl-b conflicts)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g display-time 3000
set -g focus-events on
set -g mouse on
set -g escape-time 0           # No delay after pressing Escape
set -g repeat-time 1000        # 1s window for repeatable keys (-r)
set -g base-index 1            # Windows start at 1
set -g pane-base-index 1       # Panes start at 1
set -g renumber-windows on     # Renumber when a window is closed
set -g set-clipboard on
set -g allow-passthrough on    # Let iTerm2 escape sequences pass through

# ---------------------------------------------------------------------------
# Pass through key sequences that shells/apps expect
# xterm-keys makes ctrl/shift/alt+arrow work correctly
# ---------------------------------------------------------------------------
setw -g xterm-keys on

# Page Up/Down enter copy mode and scroll tmux history (not iTerm scrollback)
bind -n PageUp copy-mode -u
bind -n PageDown send-keys PageDown

# ---------------------------------------------------------------------------
# Mouse: select text → copy to clipboard → back to normal (like iTerm)
# ---------------------------------------------------------------------------
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
# Double click selects word and copies
bind -T root DoubleClick1Pane select-pane \; copy-mode \; send -X select-word \; send -X copy-pipe-and-cancel "pbcopy"
# Right click pastes
bind -T root MouseDown3Pane paste-buffer

# ---------------------------------------------------------------------------
# Key bindings: Pane splitting (use current pane's path)
# ---------------------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ---------------------------------------------------------------------------
# Key bindings: Pane navigation (vim-style + arrows)
# ---------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window cycling (repeatable)
bind -r n next-window
bind -r p previous-window

# Alt+Up/Down without prefix for tmux pane navigation (up/down within a stack)
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift+Left/Right: delete word backward/forward
bind -n S-Left send-keys M-BSpace   # backward-kill-word
bind -n S-Right send-keys M-d       # kill-word

# Ctrl+Left/Right without prefix for left/right pane navigation
bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R

# Unbind Alt+Left/Right so they pass through for word-jump in shell
unbind -n M-Left
unbind -n M-Right
# Also unbind the prefix versions that shadow these
unbind -T prefix M-Left
unbind -T prefix M-Right
unbind -T prefix M-Up
unbind -T prefix M-Down

# ---------------------------------------------------------------------------
# Key bindings: Pane resizing
# ---------------------------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------------------------------
# Key bindings: Window (stack) navigation
# Alt+number reserved for Hammerspoon window management
# Use prefix + number instead
# ---------------------------------------------------------------------------
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# ---------------------------------------------------------------------------
# Key bindings: Swapping and moving panes/windows
# ---------------------------------------------------------------------------
# Swap current pane with neighbor (within a window)
bind -r < swap-pane -U        # Move pane up in stack
bind -r > swap-pane -D        # Move pane down in stack

# Swap windows (move stacks left/right)
bind -r P swap-window -t -1 \; previous-window    # Move stack left
bind -r N swap-window -t +1 \; next-window         # Move stack right

# Move current pane to another window
bind m command-prompt -p "Move pane to window:" "join-pane -t '%%'"
bind M break-pane              # Pop pane out to its own window

# ---------------------------------------------------------------------------
# Key bindings: Misc
# ---------------------------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind C-k send-keys C-l \; clear-history \; display "Cleared"
bind S setw synchronize-panes \; display "Sync #{?pane_synchronized,ON,OFF}"
bind = select-layout -E                # Equalize panes (spread evenly, preserve layout)
bind z resize-pane -Z                  # Toggle zoom (already default)

# ---------------------------------------------------------------------------
# Layout mode: prefix + w, then pick a layout
# ---------------------------------------------------------------------------
bind w run-shell 'tmux list-windows -F "#{window_index}: #{window_name} (#{pane_current_path})" | fzf-tmux --reverse | cut -d: -f1 | xargs -I{} tmux select-window -t {}'
bind W switch-client -T layout
bind -T layout 1 select-layout even-horizontal    # side-by-side
bind -T layout 2 select-layout even-vertical      # stacked
bind -T layout 3 select-layout main-horizontal    # big top, rest below
bind -T layout 4 select-layout main-vertical      # big left, rest right
bind -T layout 5 select-layout tiled              # tiled
bind -T layout = select-layout -E                 # equalize, preserve layout

# ---------------------------------------------------------------------------
# Stack mode: prefix + s, quick stack operations
# ---------------------------------------------------------------------------
bind s switch-client -T stack
# Create a 2-pane stack (claude + shell) in new window
bind -T stack 2 new-window -c "#{pane_current_path}" \; \
    split-window -v -c "#{pane_current_path}" -l 30% \; \
    select-pane -t 1
# Create a 3-pane stack (claude + shell + dev) in new window
bind -T stack 3 new-window -c "#{pane_current_path}" \; \
    split-window -v -c "#{pane_current_path}" -l 50% \; \
    split-window -v -c "#{pane_current_path}" -l 40% \; \
    select-pane -t 1
# Quick: create stack and start claude in top pane
bind -T stack c new-window -c "#{pane_current_path}" \; \
    split-window -v -c "#{pane_current_path}" -l 30% \; \
    select-pane -t 1 \; \
    send-keys "claude" Enter
# Session picker
bind -T stack s choose-session

# ---------------------------------------------------------------------------
# Copy mode: vi keys
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-Up send -X -N 5 scroll-up
bind -T copy-mode-vi C-Down send -X -N 5 scroll-down

# ---------------------------------------------------------------------------
# Status bar: show window/stack names clearly
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#89b4fa,bold] #S #[default]│ "
set -g status-right "#[fg=#6c7086]#H │ %H:%M"

# Window status — show pane count to indicate stack depth
setw -g window-status-format "#[fg=#6c7086] #I:#W(#{window_panes}) "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W(#{window_panes}) "

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"


# Show pane titles (set with: select-pane -T "title")
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "
